# render.yaml
services:
  - type: web
    name: plataforma-documentos-backend
    runtime: python
    rootDir: backend  # <--- MUDAR PARA backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: plataforma-documentos-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
    plan: free

  - type: web
    name: plataforma-documentos-frontend
    runtime: python
    rootDir: frontend
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: API_URL
        value: https://plataforma-documentos-backend.onrender.com
    plan: free

databases:
  - name: plataforma-documentos-db
    plan: free
    databaseName: documentos
    user: app